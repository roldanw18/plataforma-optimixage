name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/sprint2
      - feature/sprint3
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: "ci-test-secret-key"
      ENVIRONMENT: "test"

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ./backend

      - name: Verificar importaciones y sintaxis
        run: python -c "from app.main import app; print('App OK')"
        working-directory: ./backend

      - name: Ejecutar tests con cobertura
        run: pytest -v --cov=app --cov-report=term-missing --cov-fail-under=60
        working-directory: ./backend

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: ./frontend

      - name: Build de produccion
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8000' }}

      - name: Verificar artefacto de build
        run: test -f frontend/dist/index.html

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    environment:
      name: staging
      url: ${{ vars.STAGING_URL || 'http://localhost:8000' }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Descargar artefacto frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Verificar configuracion de despliegue
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Frontend build disponible"
          echo ""
          echo "Para despliegue real configura los secrets:"
          echo "  - DATABASE_URL  (PostgreSQL/Supabase de produccion)"
          echo "  - SECRET_KEY    (clave JWT segura, p.ej. token_urlsafe(64))"
          echo "  - CORS_ORIGINS  (dominio publico del frontend)"
          echo "  - STAGING_URL   (URL del servidor de staging)"

      - name: Resumen del despliegue
        run: |
          echo "## Despliegue Sprint 3" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Fecha  | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Estado | OK |" >> $GITHUB_STEP_SUMMARY
